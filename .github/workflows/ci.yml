name: RAVANA CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.10"

jobs:
  # ── Critical Path Tests (fast, runs on every push) ──
  ci-critical:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[full,dev]
      - name: Run CI-critical tests
        run: |
          mkdir -p data output checkpoints
          python -m pytest tests/ci/ -v --tb=short -x --ci

  # ── Unit Tests (module-level, fast) ──
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[full,dev]
      - name: Run unit tests
        run: |
          mkdir -p data output checkpoints
          python -m pytest tests/unit/ -v --tb=short -x

  # ── Integration Tests (cross-module, slower) ──
  integration-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[full,dev]
      - name: Run integration tests
        run: |
          mkdir -p data output checkpoints
          python -m pytest tests/integration/ -v --tb=short -x

  # ── Full Test Suite (all tests, no -x) ──
  full-suite:
    runs-on: ubuntu-latest
    needs: [ci-critical, unit-tests, integration-tests]
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[full,dev]
      - name: Run full test suite
        run: |
          mkdir -p data output checkpoints
          python -m pytest tests/ --tb=short --durations=10
